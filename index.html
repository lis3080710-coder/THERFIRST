<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunch Recommender - 점심 메뉴 추천</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container menu-recommender">
    <h1>🍱 점심 메뉴 추천</h1>
    <p class="subtitle">자주 먹는 메뉴를 입력하고 오늘 점심을 골라보세요!</p>

    <div class="input-group">
      <input type="text" id="menu-input" placeholder="예: 김치찌개, 돈가스, 마라탕..." autocomplete="off">
      <button id="add-btn" class="add-btn">추가</button>
    </div>

    <div id="menu-list" class="menu-list">
      <!-- 메뉴 항목들이 여기에 추가됩니다 -->
    </div>

    <div class="action-group">
      <button id="recommend-btn" class="recommend-btn" disabled>오늘의 메뉴는?</button>
    </div>

    <div id="result-overlay" class="result-overlay hidden">
      <div class="result-card">
        <h2>오늘의 점심!</h2>
        <div id="result-menu" class="result-menu"></div>
        <button id="close-btn" class="close-btn">다시 하기</button>
      </div>
    </div>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
1</body>
</html>
