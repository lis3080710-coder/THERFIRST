<!doctype html>
1<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>화장품 계절 분류 & 제휴 문의</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <!-- 화장품 계절 분류 검색 -->
  <div class="container cosmetics-container">
    <h1>화장품 계절 분류 검색</h1>
    <p class="subtitle">화장품 이름이나 성분을 입력하면 AI가 계절별 적합성을 분석해드립니다.</p>

    <form id="cosmetics-form">
      <div class="search-group">
        <input
          type="text"
          id="cosmetics-input"
          placeholder="예: 선크림, 히알루론산 세럼, 립밤, 수분크림..."
          autocomplete="off"
        />
        <button type="submit" class="search-btn">분석하기</button>
      </div>
    </form>

    <div id="cosmetics-loading" class="loading hidden">
      <div class="spinner"></div>
      <span>AI가 분석 중입니다...</span>
    </div>

    <div id="cosmetics-result" class="result-card hidden"></div>
  </div>

  <!-- 로또 번호 추출기 -->
  <div class="container lotto-container">
    <h1>로또 번호 추천</h1>
    <p class="subtitle">이 번호가 좋겠어!!</p>
    
    <div id="lotto-display" class="lotto-display">
      <div class="lotto-ball-placeholder">?</div>
      <div class="lotto-ball-placeholder">?</div>
      <div class="lotto-ball-placeholder">?</div>
      <div class="lotto-ball-placeholder">?</div>
      <div class="lotto-ball-placeholder">?</div>
      <div class="lotto-ball-placeholder">?</div>
    </div>

    <button id="lotto-btn" class="lotto-btn">번호 추출하기</button>
  </div>

  <!-- 제휴 문의 -->
  <div class="container">
    <h1>제휴 문의</h1>
    <p class="subtitle">파트너십 및 제휴 관련 문의를 남겨주세요. 빠르게 답변드리겠습니다.</p>

    <form id="contact-form" action="https://formspree.io/f/xjgaerdg" method="POST">
      <div class="form-group">
        <label for="name">담당자 이름 <span class="required">*</span></label>
        <input type="text" id="name" name="name" placeholder="홍길동" required />
      </div>

      <div class="form-group">
        <label for="company">회사명 <span class="required">*</span></label>
        <input type="text" id="company" name="company" placeholder="(주)회사명" required />
      </div>

      <div class="form-group">
        <label for="email">이메일 <span class="required">*</span></label>
        <input type="email" id="email" name="email" placeholder="example@company.com" required />
      </div>

      <div class="form-group">
        <label for="phone">연락처</label>
        <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" />
      </div>

      <div class="form-group">
        <label for="partnership-type">제휴 유형 <span class="required">*</span></label>
        <select id="partnership-type" name="partnership_type" required>
          <option value="" disabled selected>제휴 유형을 선택해주세요</option>
          <option value="마케팅 제휴">마케팅 제휴</option>
          <option value="기술 제휴">기술 제휴</option>
          <option value="유통 제휴">유통 제휴</option>
          <option value="투자/M&A">투자/M&A</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">문의 내용 <span class="required">*</span></label>
        <textarea id="message" name="message" rows="5" placeholder="제휴 목적 및 구체적인 내용을 작성해주세요." required></textarea>
      </div>

      <button type="submit" class="submit-btn">문의 보내기</button>
    </form>

    <div id="success-message" class="success-message hidden">
      문의가 성공적으로 접수되었습니다. 빠른 시일 내에 연락드리겠습니다.
    </div>
  </div>

  <div class="container disqus-container">
    <div id="disqus_thread"></div>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
  </div>

  <script>
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://thefirst-1.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
